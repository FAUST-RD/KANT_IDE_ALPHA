name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall -q kant kant_editor.py test_kant_smoke.py
      - name: Run offscreen smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python test_kant_smoke.py
