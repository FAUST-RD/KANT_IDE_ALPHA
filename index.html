<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>KANT Editor</title>
<style>
  :root{
    --bg:#1e1e1e; --panel:#252526; --border:#3c3c3c; --text:#d4d4d4;
    --dim:#8a8a8a; --accent:#4fa3ff; --code-bg:#161616;
    --mod:#c586c0; --cls:#4ec9b0; --fn:#dcdcaa; --typ:#4ec9b0;
    --cst:#9cdcfe; --var:#9cdcfe; --cfg:#e2c08d; --tst:#f48771;
    --hl-keyword:#cc7832; --hl-string:#6a8759; --hl-comment:#808080; --hl-number:#6897bb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Consolas,"Cascadia Mono",monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  header{display:flex;gap:10px;align-items:center;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border)}
  header h1{font-size:14px;margin:0;font-weight:600;color:var(--accent)}
  header .spacer{flex:1}
  button{background:#2d2d2d;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:5px 10px;cursor:pointer;font-family:inherit;font-size:12px}
  button:hover{background:#3a3a3a}
  button:disabled{opacity:.4;cursor:default}
  main{flex:1;display:flex;min-height:0}
  #welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px}
  #welcome h2{font-size:28px;font-weight:600;color:var(--text);margin:0}
  #welcome p{font-size:15px;color:var(--dim);max-width:480px;margin:0}
  #openFolderBig{font-size:20px;padding:16px 32px;border-radius:8px}
  #project{width:260px;min-width:160px;max-width:70vw;overflow:auto;background:var(--panel);border-right:1px solid var(--border);padding:8px;font-size:12px;flex-shrink:0}
  #project .node{cursor:pointer;white-space:normal;overflow-wrap:anywhere;padding:2px 4px;border-radius:3px}
  #project .node:hover{background:#2d2d2d}
  #project details{margin:0}
  #project summary{list-style:none;cursor:pointer;padding:2px 4px;border-radius:3px;color:var(--dim);white-space:normal;overflow-wrap:anywhere}
  #project summary.file-summary{color:var(--text)}
  #project summary.file-summary.active{background:#37373d;color:var(--accent)}
  #project summary::-webkit-details-marker{display:none}
  #project summary:hover{background:#2d2d2d}
  #project .indent{padding-left:14px}
  #resizer{width:5px;flex-shrink:0;cursor:col-resize;background:var(--border)}
  #resizer:hover,#resizer.dragging{background:var(--accent)}
  #view{flex:1;overflow:auto;padding:10px 16px}
  .tag{font-weight:700;margin-right:4px}
  .tag-MOD{color:var(--mod)} .tag-CLS{color:var(--cls)} .tag-FN{color:var(--fn)}
  .tag-TYP{color:var(--typ)} .tag-CST{color:var(--cst)} .tag-VAR{color:var(--var)}
  .tag-CFG{color:var(--cfg)} .tag-TST{color:var(--tst)}
  details.kant-node{border-left:2px solid var(--border);margin:4px 0 4px 4px;padding-left:10px}
  details.kant-node[open]>summary{margin-bottom:4px}
  summary{cursor:pointer;padding:3px 4px;border-radius:3px;font-size:13px}
  summary:hover{background:#2a2a2a}
  .kant-leaf{margin:2px 0}
  .leaf-header{padding:3px 4px;font-size:13px}
  .desc{color:var(--dim);font-weight:400;margin-left:6px}
  .category-desc{display:block;color:var(--dim);font-size:11px;font-weight:400;line-height:1.4;margin-top:2px;white-space:normal}
  .codeblock{background:var(--code-bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;font-size:12.5px;line-height:1.5;white-space:pre;overflow-x:auto;outline:none;margin:4px 0}
  .codeblock:focus{border-color:var(--accent)}
  .plain{color:var(--text)}
  .hl-keyword{color:var(--hl-keyword)}
  .hl-string{color:var(--hl-string)}
  .hl-comment{color:var(--hl-comment);font-style:italic}
  .hl-number{color:var(--hl-number)}
  #placeholder{color:var(--dim);padding:20px;font-size:13px}
  #filename{color:var(--dim);font-size:12px}
  #filename.dirty::after{content:" ●";color:var(--accent)}
  #syntaxStatus{font-size:12px}
  #syntaxStatus.ok{color:#6a8759}
  #syntaxStatus.err{color:var(--tst);cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>KANT Editor</h1>
  <button id="openFolder">Apri cartella…</button>
  <span id="filename"></span>
  <span id="syntaxStatus"></span>
  <div class="spacer"></div>
  <button id="expandAll" disabled>Espandi tutto</button>
  <button id="collapseAll" disabled>Comprimi tutto</button>
  <button id="save" disabled>Salva</button>
</header>
<main>
  <div id="welcome">
    <h2>KANT Editor</h2>
    <p>Apri la cartella di un progetto per esplorarlo: i file vengono etichettati secondo i marcatori KANT (<code>[TAG OPEN] Nome</code> / <code>[TAG CLOSED] Nome</code>) e mostrati suddivisi in sezioni pieghevoli secondo la gerarchia MOD &gt; CLS &gt; FN, ecc.</p>
    <button id="openFolderBig">Apri cartella…</button>
  </div>
  <div id="project" style="display:none"></div>
  <div id="resizer" style="display:none"></div>
  <div id="view" style="display:none"></div>
</main>

<script>
// [FN CATEGORY] parseKant — stack-based single pass over source lines; matches OPEN/CLOSED markers
// by tag+name to build a nested tree, preserving code/child ordering for lossless reconstruction
// [FN] parseKant — parses KANT-tagged source into a section tree
// [FN OPEN] parseKant
function parseKant(source) {
  const lines = source.split('\n');
  const OPEN = /\[(\w+)\s+OPEN\]\s+(\S.*?)\s*$/;
  const CLOSED = /\[(\w+)\s+CLOSED\]\s+(\S.*?)\s*$/;
  const CATEGORY = /\[(\w+)\s+CATEGORY\]\s+(\S.*?)\s*$/;
  const TAGLINE = /\[(\w+)\]\s+(\S.*?)\s*$/;

  let runId = 0, nodeId = 0;
  const root = { tag: 'ROOT', name: '', desc: '', body: [] };
  const stack = [root];
  let pendingCategory = null, pendingTag = null;

  function currentBody() { return stack[stack.length - 1].body; }
  function pushLine(text) {
    const body = currentBody();
    const last = body[body.length - 1];
    if (last && last.type === 'run') last.lines.push(text);
    else body.push({ type: 'run', id: 'r' + (runId++), lines: [text] });
  }

  for (const line of lines) {
    let m;
    if ((m = line.match(CATEGORY))) { pendingCategory = { raw: line, tag: m[1], text: m[2] }; continue; }
    if ((m = OPEN.exec(line)) && !CATEGORY.test(line)) {
      const node = {
        tag: m[1], name: m[2], body: [], uid: nodeId++,
        openRaw: line, closedRaw: null,
        categoryRaw: pendingCategory ? pendingCategory.raw : null,
        tagRaw: pendingTag ? pendingTag.raw : null,
        desc: pendingTag ? pendingTag.text.replace(/^\S+\s*—?\s*/, '') : (pendingCategory ? pendingCategory.text.replace(/^\S+\s*—?\s*/, '') : m[2]),
        categoryDesc: pendingCategory ? pendingCategory.text.replace(/^\S+\s*—?\s*/, '') : null,
      };
      pendingCategory = null; pendingTag = null;
      currentBody().push({ type: 'node', node });
      stack.push(node);
      continue;
    }
    if ((m = line.match(CLOSED))) {
      // pop until matching tag+name is found (tolerates stray/mismatched markers)
      for (let i = stack.length - 1; i > 0; i--) {
        if (stack[i].tag === m[1] && stack[i].name === m[2]) {
          stack[i].closedRaw = line;
          stack.length = i;
          break;
        }
      }
      continue;
    }
    if ((m = line.match(TAGLINE)) && !OPEN.test(line) && !CLOSED.test(line)) {
      pendingTag = { raw: line, tag: m[1], text: m[2] };
      continue;
    }
    // flush any tentative header lines that never resolved into an OPEN (plain comment lines)
    if (pendingCategory) { pushLine(pendingCategory.raw); pendingCategory = null; }
    if (pendingTag) { pushLine(pendingTag.raw); pendingTag = null; }
    pushLine(line);
  }
  if (pendingCategory) pushLine(pendingCategory.raw);
  if (pendingTag) pushLine(pendingTag.raw);
  return root;
}
// [FN CLOSED] parseKant

// [FN CATEGORY] serializeKant — walks the tree in original order, using edited run text where present
// [FN] serializeKant — reconstructs full source text from a (possibly edited) tree
// [FN OPEN] serializeKant
function serializeKant(node) {
  const out = [];
  for (const item of node.body) {
    if (item.type === 'run') out.push(item.lines.join('\n'));
    else {
      const n = item.node;
      if (n.categoryRaw) out.push(n.categoryRaw);
      if (n.tagRaw) out.push(n.tagRaw);
      out.push(n.openRaw);
      out.push(serializeKant(n));
      if (n.closedRaw) out.push(n.closedRaw);
    }
  }
  return out.join('\n');
}
// [FN CLOSED] serializeKant

// [FN CATEGORY] escapeHtml — escapes text pulled from source code before it lands in innerHTML,
// so names/descriptions containing < & etc. render literally instead of breaking the markup
// [FN] escapeHtml — HTML-escapes a string for safe innerHTML interpolation
// [FN OPEN] escapeHtml
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
// [FN CLOSED] escapeHtml

// [CST] HL_KEYWORDS — cross-language keyword set for the lightweight syntax highlighter below
const HL_KEYWORDS = new Set((
  'def class function return if elif else for while do switch case break continue import from as ' +
  'export default const let var public private protected static final void int float double long short ' +
  'byte char bool boolean string String True False None null nil undefined true false self this new ' +
  'delete try except catch finally throw throws raise yield async await lambda with in is not and or ' +
  'typeof instanceof extends implements interface enum struct namespace using package fn pub mut impl match'
).split(' '));

// ponytail: HL_TOKEN_RE is a generic cross-language tokenizer, not a real per-language parser — it
// colors comments/strings/numbers/keywords well enough to read but has no concept of syntax per file
// type. Upgrade to a real lexer (e.g. per-extension grammar) if precision on a specific language matters.
const HL_TOKEN_RE = /(#[^\n]*|\/\/[^\n]*)|(\/\*[\s\S]*?\*\/)|("(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*'|`(?:[^`\\]|\\.)*`)|(\b\d+(?:\.\d+)?\b)|(\b[A-Za-z_]\w*\b)/g;

// [FN CATEGORY] highlightCode — single-pass tokenizer approximating PyCharm's Darcula palette; walks
// the regex matches and escapes+wraps each token, escaping the untouched text between matches too so
// no raw source character (e.g. "<") ever reaches innerHTML unescaped
// [FN] highlightCode — wraps recognized tokens in colored spans for a code string
// [FN OPEN] highlightCode
function highlightCode(text) {
  let out = '', lastIndex = 0, m;
  HL_TOKEN_RE.lastIndex = 0;
  while ((m = HL_TOKEN_RE.exec(text))) {
    out += escapeHtml(text.slice(lastIndex, m.index));
    const [match, comment, blockComment, string, number, word] = m;
    if (comment || blockComment) out += `<span class="hl-comment">${escapeHtml(match)}</span>`;
    else if (string) out += `<span class="hl-string">${escapeHtml(match)}</span>`;
    else if (number) out += `<span class="hl-number">${escapeHtml(match)}</span>`;
    else if (word && HL_KEYWORDS.has(word)) out += `<span class="hl-keyword">${escapeHtml(match)}</span>`;
    else out += escapeHtml(match);
    lastIndex = m.index + match.length;
  }
  out += escapeHtml(text.slice(lastIndex));
  return out;
}
// [FN CLOSED] highlightCode

// [CST] BRACKET_PAIRS — opening→closing bracket map used by the generic syntax checker below
const BRACKET_PAIRS = { '(': ')', '[': ']', '{': '}' };
// [CST] BRACKET_CLOSERS — closing→opening bracket map, the inverse of BRACKET_PAIRS
const BRACKET_CLOSERS = { ')': '(', ']': '[', '}': '{' };

// ponytail: a real syntax checker needs a grammar per language; checkSyntax instead validates the
// one thing that's true of nearly every language — brackets/parens/braces must balance — and skips
// comments/strings (reusing HL_TOKEN_RE) so bracket-like characters inside them don't misfire. It
// catches unbalanced/misplaced brackets in any language but not, say, a missing semicolon.
// [FN CATEGORY] checkSyntax — scans the full reconstructed file text for unbalanced brackets,
// treating comment/string tokens (from the same tokenizer used for highlighting) as opaque so
// brackets mentioned inside them don't produce false positives
// [FN] checkSyntax — reports the first bracket-balance error in a source string, or ok:true
// [FN OPEN] checkSyntax
function checkSyntax(text) {
  const stack = [];
  let line = 1;

  function scanPlain(segment) {
    for (const ch of segment) {
      if (ch === '\n') { line++; continue; }
      if (BRACKET_PAIRS[ch]) { stack.push({ ch, line }); continue; }
      if (BRACKET_CLOSERS[ch]) {
        const top = stack[stack.length - 1];
        if (!top || top.ch !== BRACKET_CLOSERS[ch]) {
          return { ok: false, line, message: `"${ch}" senza corrispondenza` };
        }
        stack.pop();
      }
    }
    return null;
  }

  let lastIndex = 0, m, err;
  HL_TOKEN_RE.lastIndex = 0;
  while ((m = HL_TOKEN_RE.exec(text))) {
    err = scanPlain(text.slice(lastIndex, m.index));
    if (err) return err;
    const [match, comment, blockComment, string] = m;
    if (comment || blockComment || string) {
      for (const ch of match) if (ch === '\n') line++;
    } else {
      err = scanPlain(match);
      if (err) return err;
    }
    lastIndex = m.index + match.length;
  }
  err = scanPlain(text.slice(lastIndex));
  if (err) return err;
  if (stack.length) {
    const top = stack[stack.length - 1];
    return { ok: false, line: top.line, message: `"${top.ch}" non chiuso` };
  }
  return { ok: true };
}
// [FN CLOSED] checkSyntax

// [FN CATEGORY] getCaretCharOffset — measures the caret as a plain character count from the start of
// the element, needed because rewriting innerHTML (to re-highlight) resets the browser's own caret
// [FN] getCaretCharOffset — returns caret offset within a contenteditable element
// [FN OPEN] getCaretCharOffset
function getCaretCharOffset(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount || !el.contains(sel.getRangeAt(0).startContainer)) return 0;
  const range = sel.getRangeAt(0);
  const preRange = range.cloneRange();
  preRange.selectNodeContents(el);
  preRange.setEnd(range.endContainer, range.endOffset);
  return preRange.toString().length;
}
// [FN CLOSED] getCaretCharOffset

// [FN CATEGORY] setCaretCharOffset — walks text nodes to find the one containing the target offset
// and places the caret there; the inverse of getCaretCharOffset
// [FN] setCaretCharOffset — restores caret position within a contenteditable element by offset
// [FN OPEN] setCaretCharOffset
function setCaretCharOffset(el, offset) {
  const range = document.createRange();
  const sel = window.getSelection();
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  let remaining = offset, node, found = false;
  while ((node = walker.nextNode())) {
    if (remaining <= node.length) { range.setStart(node, remaining); range.collapse(true); found = true; break; }
    remaining -= node.length;
  }
  if (!found) { range.selectNodeContents(el); range.collapse(false); }
  sel.removeAllRanges();
  sel.addRange(range);
}
// [FN CLOSED] setCaretCharOffset

// [FN CATEGORY] onCodeEdit — syncs a code block's plain text back onto its node, then re-applies
// syntax highlighting and restores the caret (innerHTML rewrites otherwise reset it to the start)
// [FN] onCodeEdit — handles a keystroke inside an editable code block
// [FN OPEN] onCodeEdit
function onCodeEdit(pre, item) {
  const offset = getCaretCharOffset(pre);
  const text = pre.textContent;
  item.lines = text.split('\n');
  pre.innerHTML = highlightCode(text);
  setCaretCharOffset(pre, offset);
  markDirty();
  updateSyntaxStatus();
}
// [FN CLOSED] onCodeEdit

// [FN CATEGORY] renderFile — builds DOM for the currently open file's tree; each contiguous code run
// becomes a syntax-highlighted editable block wired back into the node. A tagged element with nested
// tagged children renders as a collapsible <details> (border + indent — there's something to fold);
// a leaf (e.g. a constant, no children) renders as a flat header with no indent, since a row of
// consecutive leaves (like several constants) has nothing to nest and shouldn't look nested.
// [FN] renderFile — renders the parsed tree of the open file into #view
// [FN OPEN] renderFile
function renderFile(root) {
  const view = document.getElementById('view');
  view.innerHTML = '';

  function buildNodeDom(node, container, depth) {
    for (const item of node.body) {
      if (item.type === 'run') {
        const pre = document.createElement('div');
        pre.className = 'codeblock plain';
        pre.contentEditable = 'true';
        pre.spellcheck = false;
        pre.innerHTML = highlightCode(item.lines.join('\n'));
        pre.addEventListener('input', () => onCodeEdit(pre, item));
        container.appendChild(pre);
      } else {
        const n = item.node;
        const hasChildren = n.body.some(i => i.type === 'node');
        const headerHtml = `<span class="tag tag-${n.tag}">[${n.tag}]</span>${escapeHtml(n.name)}${n.desc ? `<span class="desc">— ${escapeHtml(n.desc)}</span>` : ''}` +
          (n.categoryDesc ? `<span class="category-desc">${escapeHtml(n.categoryDesc)}</span>` : '');
        if (hasChildren) {
          const details = document.createElement('details');
          details.className = 'kant-node';
          details.open = depth < 1;
          details.id = 'kant-' + n.uid;
          const summary = document.createElement('summary');
          summary.innerHTML = headerHtml;
          details.appendChild(summary);
          buildNodeDom(n, details, depth + 1);
          container.appendChild(details);
        } else {
          const leaf = document.createElement('div');
          leaf.className = 'kant-leaf';
          leaf.id = 'kant-' + n.uid;
          const header = document.createElement('div');
          header.className = 'leaf-header';
          header.innerHTML = headerHtml;
          leaf.appendChild(header);
          buildNodeDom(n, leaf, depth + 1);
          container.appendChild(leaf);
        }
      }
    }
  }
  buildNodeDom(root, view, 0);
}
// [FN CLOSED] renderFile

// [FN CATEGORY] revealSection — expands every ancestor <details> of a section and scrolls it into
// view; used by the KANT outline nested under each file in the project tree. Keyed by uid rather
// than tag+name, since two sibling scopes can have identically-named elements (e.g. a method called
// "process" in two different classes) — tag+name alone isn't a unique lookup key.
// [FN] revealSection — expands and scrolls to a section in #view by uid
// [FN OPEN] revealSection
function revealSection(uid) {
  const el = document.getElementById('kant-' + uid);
  if (!el) return;
  const view = document.getElementById('view');
  el.open = true;
  let p = el.parentElement;
  while (p && p !== view) { if (p.tagName === 'DETAILS') p.open = true; p = p.parentElement; }
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
// [FN CLOSED] revealSection

// [FN CATEGORY] buildOutlineTree — walks only the tagged nodes of a parsed tree (skips code runs)
// to render the compact KANT outline nested under a file entry in the project tree
// [FN] buildOutlineTree — renders a file's KANT section tree into a container
// [FN OPEN] buildOutlineTree
function buildOutlineTree(node, container, depth) {
  for (const item of node.body) {
    if (item.type !== 'node') continue;
    const n = item.node;
    const row = document.createElement('div');
    row.className = 'node';
    row.style.paddingLeft = (depth * 14) + 'px';
    row.innerHTML = `<span class="tag tag-${n.tag}">[${n.tag}]</span>${escapeHtml(n.desc || n.name)}`;
    row.title = n.name;
    row.addEventListener('click', () => revealSection(n.uid));
    container.appendChild(row);
    buildOutlineTree(n, container, depth + 1);
  }
}
// [FN CLOSED] buildOutlineTree

// [CST] IGNORE_DIRS — directory names skipped when walking a project folder
const IGNORE_DIRS = new Set(['.git', 'node_modules', 'venv', '.venv', '__pycache__', 'dist', 'build', '.idea', '.vscode']);

let currentFileHandle = null, currentTree = null, currentPath = '', dirty = false;
let rootDirHandle = null;

// [FN CATEGORY] markDirty — flags the open file as having unsaved edits and reflects it in the header
// [FN] markDirty — sets dirty state and updates the filename indicator
// [FN OPEN] markDirty
function markDirty() {
  dirty = true;
  document.getElementById('filename').classList.add('dirty');
}
// [FN CLOSED] markDirty

// [FN CATEGORY] updateSyntaxStatus — reconstructs the current file's full text and runs checkSyntax
// on it, reflecting the result in the header badge; re-run after every edit and on file open
// [FN] updateSyntaxStatus — refreshes the syntax-check badge for the currently open file
// [FN OPEN] updateSyntaxStatus
function updateSyntaxStatus() {
  const badge = document.getElementById('syntaxStatus');
  if (!currentTree) { badge.textContent = ''; badge.className = ''; return; }
  const result = checkSyntax(serializeKant(currentTree));
  if (result.ok) {
    badge.textContent = '✓ Sintassi OK';
    badge.className = 'ok';
    badge.title = '';
  } else {
    badge.textContent = `✗ riga ${result.line}: ${result.message}`;
    badge.className = 'err';
    badge.title = 'Controllo generico di bilanciamento parentesi/graffe/quadre';
  }
}
// [FN CLOSED] updateSyntaxStatus

// [FN CATEGORY] openFile — parses a file's contents and renders it as the active file; guards against
// silently discarding unsaved edits in the previously open file. Accepts an already-parsed tree
// (the project tree parses every listed file anyway, to build its label) to avoid reading it twice.
// Returns whether the file was actually opened, so callers know if the user cancelled.
// [FN] openFile — opens a project file into the editor
// [FN OPEN] openFile
async function openFile(fileHandle, path, summaryEl, preParsedTree) {
  if (dirty && !confirm(`"${currentPath}" ha modifiche non salvate. Continuare e perderle?`)) return false;
  let tree = preParsedTree;
  if (!tree) {
    const file = await fileHandle.getFile();
    tree = parseKant(await file.text());
  }
  currentFileHandle = fileHandle;
  currentTree = tree;
  currentPath = path;
  dirty = false;
  document.getElementById('filename').textContent = path;
  document.getElementById('filename').classList.remove('dirty');
  document.getElementById('expandAll').disabled = false;
  document.getElementById('collapseAll').disabled = false;
  document.getElementById('save').disabled = false;
  document.querySelectorAll('#project summary.active').forEach(r => r.classList.remove('active'));
  if (summaryEl) summaryEl.classList.add('active');
  renderFile(currentTree);
  updateSyntaxStatus();
  return true;
}
// [FN CLOSED] openFile

// [FN CATEGORY] readTopLevelLabel — reads a file and parses it just to find its first top-level KANT
// node (the file's MOD/CFG/TST), so the project tree can label the file by convention instead of by
// filename. Returns null for files with no KANT tags, so they're left out of the tree entirely.
// Also returns null (rather than throwing) if the file can't be read — an unreadable/undecodable
// file would otherwise reject this async call and abort the whole buildProjectTree loop, silently
// leaving every remaining sibling file/folder out of the tree.
// ponytail: reads full file contents for every listed file just to build its label — fine for the
// KANT-tagged codebases this tool targets; add caching/streaming if directories get huge.
// [FN] readTopLevelLabel — extracts a file's top-level tag+desc and its parsed tree
// [FN OPEN] readTopLevelLabel
async function readTopLevelLabel(fileHandle) {
  let text;
  try {
    const file = await fileHandle.getFile();
    text = await file.text();
  } catch (e) {
    return null;
  }
  const tree = parseKant(text);
  const top = tree.body.find(i => i.type === 'node');
  if (!top) return null;
  return { tag: top.node.tag, desc: top.node.desc || top.node.name, tree, topNode: top.node };
}
// [FN CLOSED] readTopLevelLabel

// [FN CATEGORY] buildProjectTree — recursively walks a directory handle, skipping ignored dirs,
// sorting directories before files, and renders a PyCharm-style collapsible explorer. Files are
// labeled by their top-level KANT tag (e.g. "[MOD] login/logout endpoints"), not by filename —
// only files that actually carry KANT convention tags are shown.
// [FN] buildProjectTree — renders the project folder tree into #project
// [FN OPEN] buildProjectTree
async function buildProjectTree(dirHandle, container, path) {
  const entries = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'directory' && IGNORE_DIRS.has(name)) continue;
    entries.push([name, handle]);
  }
  entries.sort((a, b) => {
    if (a[1].kind !== b[1].kind) return a[1].kind === 'directory' ? -1 : 1;
    return a[0].localeCompare(b[0]);
  });
  for (const [name, handle] of entries) {
    const childPath = path ? path + '/' + name : name;
    if (handle.kind === 'directory') {
      const details = document.createElement('details');
      const summary = document.createElement('summary');
      summary.textContent = name;
      details.appendChild(summary);
      const childWrap = document.createElement('div');
      childWrap.className = 'indent';
      details.appendChild(childWrap);
      container.appendChild(details);
      details.addEventListener('toggle', async function onToggle() {
        if (details.open && !childWrap.dataset.loaded) {
          childWrap.dataset.loaded = '1';
          await buildProjectTree(handle, childWrap, childPath);
        }
      }, { once: false });
    } else {
      const label = await readTopLevelLabel(handle);
      if (!label) continue; // no KANT tags — only convention-tagged files show up in the tree

      const details = document.createElement('details');
      details.className = 'file-entry';
      const summary = document.createElement('summary');
      summary.className = 'file-summary';
      summary.innerHTML = `<span class="tag tag-${label.tag}">[${label.tag}]</span>${escapeHtml(label.desc)}`;
      details.appendChild(summary);
      const outlineWrap = document.createElement('div');
      outlineWrap.className = 'indent';
      details.appendChild(outlineWrap);
      container.appendChild(details);

      summary.addEventListener('click', async (e) => {
        e.preventDefault();
        if (details.open) { details.open = false; return; }
        const opened = await openFile(handle, childPath, summary, label.tree);
        if (!opened) return;
        // collapse other files' outlines (not folders — those stay as the user left them)
        document.querySelectorAll('#project details.file-entry').forEach(d => { if (d !== details) d.open = false; });
        outlineWrap.innerHTML = '';
        // start from the file's own children, not the top-level MOD/CFG/TST node itself — that
        // node is already shown as this file entry's own label, showing it again as the first
        // nested row would duplicate it
        buildOutlineTree(label.topNode, outlineWrap, 0);
        details.open = true;
      });
    }
  }
}
// [FN CLOSED] buildProjectTree

// [FN CATEGORY] openFolder — shows the native directory picker and, on success, swaps the big
// centered welcome screen for the project tree + view layout
// [FN] openFolder — opens a project folder and switches out of the welcome screen
// [FN OPEN] openFolder
async function openFolder() {
  if (!('showDirectoryPicker' in window)) {
    alert('Il browser non supporta la File System Access API (serve Chrome/Edge).');
    return;
  }
  try {
    rootDirHandle = await window.showDirectoryPicker();
  } catch (e) {
    return; // user cancelled
  }
  const project = document.getElementById('project');
  project.innerHTML = '';
  await buildProjectTree(rootDirHandle, project, '');
  document.getElementById('welcome').style.display = 'none';
  project.style.display = '';
  document.getElementById('resizer').style.display = '';
  document.getElementById('view').style.display = '';
}
// [FN CLOSED] openFolder

// [CST] PROJECT_WIDTH_KEY — localStorage key the left column's dragged width is persisted under
const PROJECT_WIDTH_KEY = 'kant-editor-project-width';

// [FN CATEGORY] setupProjectResizer — lets the user drag #resizer to resize the left column and
// remembers the chosen width in localStorage so it survives across sessions
// [FN] setupProjectResizer — wires up the draggable divider between the project tree and the view
// [FN OPEN] setupProjectResizer
function setupProjectResizer() {
  const resizer = document.getElementById('resizer');
  const project = document.getElementById('project');
  const savedWidth = parseInt(localStorage.getItem(PROJECT_WIDTH_KEY), 10);
  if (savedWidth) project.style.width = savedWidth + 'px';

  let dragging = false;
  resizer.addEventListener('mousedown', (e) => {
    dragging = true;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const width = Math.max(160, Math.min(e.clientX, window.innerWidth * 0.7));
    project.style.width = width + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.userSelect = '';
    localStorage.setItem(PROJECT_WIDTH_KEY, parseInt(project.style.width, 10));
  });
}
// [FN CLOSED] setupProjectResizer
setupProjectResizer();

document.getElementById('openFolder').addEventListener('click', openFolder);
document.getElementById('openFolderBig').addEventListener('click', openFolder);

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('#view details').forEach(d => d.open = true);
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('#view details').forEach(d => d.open = false);
});
document.getElementById('save').addEventListener('click', async () => {
  if (!currentFileHandle || !currentTree) return;
  const text = serializeKant(currentTree);
  const writable = await currentFileHandle.createWritable();
  await writable.write(text);
  await writable.close();
  dirty = false;
  document.getElementById('filename').classList.remove('dirty');
});

// [FN CATEGORY] selfCheck — smallest runnable check for the parser: parses a fixture with nested
// CLS/FN markers and asserts the tree shape + round-trip serialization are lossless
// [FN] selfCheck — asserts parse+serialize round-trips a nested fixture
// [FN OPEN] selfCheck
(function selfCheck() {
  const fixture = [
    '# [CLS CATEGORY] UserManager — creates and authenticates users',
    '# [CLS] UserManager — creates and authenticates users',
    '# [CLS OPEN] UserManager',
    'class UserManager:',
    '    # [FN CATEGORY] login — checks credentials, creates session',
    '    # [FN] login — checks credentials, creates session',
    '    # [FN OPEN] login',
    '    def login(self): pass',
    '    # [FN CLOSED] login',
    '# [CLS CLOSED] UserManager',
  ].join('\n');
  try {
    const tree = parseKant(fixture);
    const cls = tree.body.find(i => i.type === 'node').node;
    console.assert(cls.tag === 'CLS' && cls.name === 'UserManager', 'KANT selfCheck: CLS not parsed');
    const fn = cls.body.find(i => i.type === 'node').node;
    console.assert(fn.tag === 'FN' && fn.name === 'login', 'KANT selfCheck: nested FN not parsed');
    console.assert(cls.categoryDesc === 'creates and authenticates users', 'KANT selfCheck: categoryDesc not extracted');
    const roundtrip = serializeKant(tree);
    console.assert(roundtrip === fixture, 'KANT selfCheck: round-trip mismatch');

    // regression: two sibling scopes with an identically-named element must get distinct uids,
    // since revealSection looks sections up by uid, not by (tag, name)
    const dupeFixture = [
      '# [CLS OPEN] A', 'class A:',
      '  # [FN OPEN] process', '  def process(self): pass', '  # [FN CLOSED] process',
      '# [CLS CLOSED] A',
      '# [CLS OPEN] B', 'class B:',
      '  # [FN OPEN] process', '  def process(self): pass', '  # [FN CLOSED] process',
      '# [CLS CLOSED] B',
    ].join('\n');
    const dupeTree = parseKant(dupeFixture);
    const [clsA, clsB] = dupeTree.body.filter(i => i.type === 'node').map(i => i.node);
    const fnA = clsA.body.find(i => i.type === 'node').node;
    const fnB = clsB.body.find(i => i.type === 'node').node;
    console.assert(fnA.tag === 'FN' && fnB.tag === 'FN' && fnA.name === fnB.name, 'KANT selfCheck: dupe fixture setup wrong');
    console.assert(fnA.uid !== fnB.uid, 'KANT selfCheck: same-named siblings got colliding uids');

    // checkSyntax: balanced brackets pass, an unclosed one is caught, and one mentioned inside a
    // comment/string doesn't produce a false positive
    console.assert(checkSyntax('def f():\n    return (1 + [2, 3])').ok === true, 'KANT selfCheck: balanced brackets flagged as bad');
    console.assert(checkSyntax('def f(:\n    return 1').ok === false, 'KANT selfCheck: unbalanced brackets not caught');
    console.assert(checkSyntax('# a stray ) in a comment\nx = (1 + 2)').ok === true, 'KANT selfCheck: bracket inside comment caused false positive');

    console.log('KANT selfCheck: OK');
  } catch (e) {
    console.error('KANT selfCheck failed:', e);
  }
})();
// [FN CLOSED] selfCheck
</script>
